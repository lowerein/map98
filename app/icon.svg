<!-- app/icon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 🌌 旅行者極光漸層：皇家藍 -> 薰衣紫 -> 熱情玫 -->
    <linearGradient id="travelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- 📱 iOS 級平滑圓角底框 -->
  <rect width="512" height="512" rx="128" fill="url(#travelGradient)" />

  <!-- 📍 黃金比例立體地標 (負空間設計) -->
  <path d="M256,64 C176.6,64 112,128.6 112,207.4 C112,311.1 240,464 256,480 C272,464 400,311.1 400,207.4 C400,128.6 335.4,64 256,64 Z M256,272 C220.7,272 192,243.3 192,208 C192,172.7 220.7,144 256,144 C291.3,144 320,172.7 320,208 C320,243.3 291.3,272 256,272 Z" fill="#ffffff" filter="url(#softShadow)" />
</svg>
